# TEMPORARY test workflow — validates the THIRD-PARTY-LICENSES generate+attach
# logic added to release-plz.yml, without touching crates.io. Safe to delete.
#
# Run via: gh workflow run zz-test-tpl-artifact.yml --ref <branch>
name: zz-test-tpl-artifact

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-tpl-artifact:
    runs-on: ubuntu-latest
    env:
      TEST_TAG: tpl-artifact-test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup override set stable
      - name: Install cargo-about
        run: cargo install cargo-about --locked --features cli
      - name: Generate THIRD-PARTY-LICENSES
        run: bash scripts/generate_third_party_licenses.sh THIRD-PARTY-LICENSES
      - name: Show generated file stats
        run: |
          wc -l THIRD-PARTY-LICENSES
          wc -c THIRD-PARTY-LICENSES
          head -5 THIRD-PARTY-LICENSES
      - name: Create or reuse a test GitHub Release and upload the file
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! gh release view "$TEST_TAG" >/dev/null 2>&1; then
            gh release create "$TEST_TAG" \
              --title "TPL artifact test (safe to delete)" \
              --notes "Throwaway release created by zz-test-tpl-artifact.yml to verify THIRD-PARTY-LICENSES attachment." \
              --prerelease
          fi
          gh release upload "$TEST_TAG" THIRD-PARTY-LICENSES --clobber
      - name: Verify the asset is attached
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release view "$TEST_TAG" --json assets --jq '.assets[].name'
          gh release view "$TEST_TAG" --json assets --jq '.assets[] | select(.name=="THIRD-PARTY-LICENSES")' \
            | grep -q THIRD-PARTY-LICENSES && echo "PASS: THIRD-PARTY-LICENSES is attached to release $TEST_TAG"
