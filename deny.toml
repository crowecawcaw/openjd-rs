# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[licenses]
version = 2
confidence-threshold = 0.8
allow = [
    "Apache-2.0",
    "MIT",
    "MIT-0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]

[bans]
# Duplicate versions are common in large transitive graphs (our AWS SDK
# brings in two copies of hyper, rustls, tokio-rustls, etc.). These are
# forced by upstream and not actionable by us, so suppress the noise.
multiple-versions = "allow"

[advisories]
version = 2
ignore = [
    # The following advisories apply only to `rustls-webpki 0.101.x`, which
    # is pulled in transitively via the AWS SDK's `legacy-rustls-ring`
    # feature of `aws-smithy-http-client`. That feature exists for hyper 0.14
    # back-compat and is not the HTTPS client used at runtime — the active
    # TLS path is `rustls 0.23` + `rustls-webpki 0.103.x` via the
    # `rustls-aws-lc` / `default-https-client` features, which is updated
    # to the patched 0.103.13+ in Cargo.lock.
    #
    # The 0.101.x line has no patch releases for these CVEs (all fixes
    # landed in 0.103.12+), and we cannot force AWS SDK to drop the legacy
    # feature. Removal plan: drop these once the AWS SDK stops pulling in
    # rustls 0.21 via `legacy-rustls-ring`.

    # RUSTSEC-2026-0098 — URI name constraints ignored.
    # Advisory itself notes the library has no API for asserting URI names
    # and URI name constraints are not implemented. Exploitation requires
    # a trusted CA to misissue a certificate with URI-name constraints.
    "RUSTSEC-2026-0098",

    # RUSTSEC-2026-0099 — Wildcard name constraints accepted incorrectly.
    # Reachable only after signature verification and requires misissuance
    # from a trusted CA. Fixed on the active 0.103 path by the Cargo.lock
    # bump; this ignore covers only the inert 0.101 legacy chain.
    "RUSTSEC-2026-0099",

    # RUSTSEC-2026-0104 — Panic in CRL parsing.
    # We do not call CRL parsing APIs and the AWS SDK does not fetch CRLs
    # via webpki. Fixed on the active 0.103 path by the Cargo.lock bump;
    # this ignore covers only the inert 0.101 legacy chain.
    "RUSTSEC-2026-0104",
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
